<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../css/acadex-styles.css">
  <link rel="stylesheet" href="../../css/forms-acadex.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded">
</head>
<body class="bg-acadex">

  <div class="form-card">
    <header class="form-header">
      <h2 class="text-prussian">Registro de Estudiante</h2>
      <p class="text-muted">Ingresa los datos para crear un nuevo expediente académico.</p>
    </header>

    <form id="formAltaAlumno" class="form-grid">
      <div class="input-group">
        <label for="numControl">Número de Control</label>
        <div class="input-wrapper">
          <span class="material-symbols-rounded icon-sapphire">fingerprint</span>
          <input type="text" id="numControl" name="numControl" placeholder="Ej. 20210634" required>
        </div>
      </div>

      <div class="input-group">
        <label for="nombre">Nombre(s)</label>
        <div class="input-wrapper">
          <span class="material-symbols-rounded icon-sapphire">person</span>
          <input type="text" id="nombre" name="nombre" placeholder="Nombre del alumno" required>
        </div>
      </div>

      <div class="input-group">
        <label for="apellidos">Apellidos</label>
        <div class="input-wrapper">
          <span class="material-symbols-rounded icon-sapphire">group</span>
          <input type="text" id="apellidos" name="apellidos" placeholder="Apaterno Amaterno" required>
        </div>
      </div>

      <div class="input-group">
        <label for="carrera">Carrera</label>
        <div class="input-wrapper">
          <span class="material-symbols-rounded icon-sapphire">engineering</span>
          <select id="carrera" name="carrera" required>
            <option value="">Selecciona carrera...</option>
            <option value="sistemas">Ing. en Sistemas Computacionales</option>
            <option value="industrial">Ing. Industrial</option>
            <option value="mecatronica">Ing. Mecatrónica</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="reset" class="btn-secondary">Limpiar</button>
        <button type="submit" class="btn-primary">Confirmar Alta</button>
      </div>
    </form>
  </div>

</body>
</html>
