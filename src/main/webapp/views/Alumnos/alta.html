<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACADEX — Registro de Estudiante</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded">
  
  <link rel="stylesheet" href="../../css/acadex-styles.css">
  <link rel="stylesheet" href="../../css/forms-acadex.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <img src="../../assets/AcadexLogo.png" alt="ACADEX Logo">
                </div>
                <span class="logo-text">ACADEX</span>
            </div>
            
            <nav class="sidebar-section">
                <p class="sidebar-label">Administración</p>
                <a href="../coordinador/materias.html" class="nav-item">
                    <span class="material-symbols-rounded nav-icon">book</span>
                    Materias
                </a>
                <a href="../coordinador/grupos.html" class="nav-item">
                    <span class="material-symbols-rounded nav-icon">groups</span>
                    Grupos / Horarios
                </a>
                <a href="#" class="nav-item active">
                    <span class="material-symbols-rounded nav-icon">person</span>
                    Alumnos
                </a>
                <a href="../Docentes/alta.html" class="nav-item">
                    <span class="material-symbols-rounded nav-icon">school</span>
                    Docentes
                </a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1 class="topbar-title">Gestión de Alumnos <span class="topbar-sub">/ Registro de Estudiante</span></h1>
                <div class="topbar-actions">
                    <div class="avatar">AJ</div>
                </div>
            </header>

            <section class="content content-centered bg-acadex">
                <div class="form-card">
                    <div class="brand-header">
                        <div class="brand-logo-circle brand-logo-transparent">
                            <img src="../../assets/AcadexLogo.png" alt="ACADEX Logo" class="brand-logo-img">
                        </div>
                        <span class="brand-name-text">Acadex</span>
                    </div>

                    <header class="form-title-group">
                        <h1 class="form-title">Registro de Estudiante</h1>
                        <p class="form-subtitle">Ingresa los datos para crear un nuevo expediente académico oficial.</p>
                    </header>

                    <form id="formAltaAlumno" class="form-grid">
                        
                        <div class="input-group">
                            <label class="input-label">Número de Control <span class="form-required">*</span></label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded icon-accent">fingerprint</span>
                                <input type="text" id="num_control" placeholder="Ej. 20210634" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Nombre(s) <span class="form-required">*</span></label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded icon-accent">person</span>
                                <input type="text" id="nombre" placeholder="Nombre del alumno" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Apellidos <span class="form-required">*</span></label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded icon-accent">group</span>
                                <input type="text" id="apellidos" placeholder="Apaterno Amaterno" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Carrera <span class="form-required">*</span></label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded icon-accent">engineering</span>
                                <select id="id_carrera" required>
                                    <option value="" disabled selected>Selecciona carrera...</option>
                                    <option value="1">Ing. en Sistemas Computacionales</option>
                                    <option value="2">Ing. Industrial</option>
                                    <option value="3">Ing. Mecatrónica</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-actions form-actions-full">
                            <button type="reset" class="btn btn-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-primary btn-lg">
                                <span id="btnText">Confirmar Alta</span>
                                <span class="material-symbols-rounded">check_circle</span>
                            </button>
                        </div>

                    </form>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
