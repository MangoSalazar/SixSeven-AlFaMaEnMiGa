<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACADEX — Mis Grupos</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded">
  
  <link rel="stylesheet" href="../../css/acadex-styles.css">
  <link rel="stylesheet" href="../../css/forms-acadex.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <img src="../../assets/AcadexLogo.png" alt="ACADEX Logo">
                </div>
                <span class="logo-text">ACADEX</span>
            </div>
            
            <nav class="sidebar-section">
                <p class="sidebar-label">Docente</p>
                <a href="#" class="nav-item active">
                    <span class="material-symbols-rounded nav-icon">grid_view</span>
                    Mis Grupos
                </a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1 class="topbar-title">Panel de Docente <span class="topbar-sub">/ Mis Grupos Asignados</span></h1>
                
                <div class="topbar-actions" style="cursor: pointer;" onclick="window.location.href='../../perfil.html'">
                    <div style="text-align: right; margin-right: 12px;">
                        <p class="font-bold text-prussian" style="font-size: 0.9rem; margin: 0;">Alejandro Juárez</p>
                        <p style="font-size: 0.75rem; color: #64748b; margin: 0;">Emp: DOC-2026</p>
                    </div>
                    <div class="avatar">AJ</div>
                </div>
            </header>

            <section class="content content-centered bg-acadex">
                <div class="form-card">

                    <header class="form-title-group">
                        <h1 class="form-title">Mis Grupos</h1>
                        <p class="form-subtitle">Selecciona un grupo para gestionar las listas de asistencia y capturar calificaciones.</p>
                    </header>

                    <div class="table-container">
                        <table class="acadex-table">
                            <thead>
                                <tr>
                                    <th>Materia</th>
                                    <th>Clave</th>
                                    <th>Aula</th>
                                    <th>Horario</th>
                                    <th>Alumnos</th>
                                    <th>Revisar</th>
                                </tr>
                            </thead>
                            <tbody id="tablaGrupos"></tbody>
                        </table>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simulación de carga desde tabla HORARIO unida a MATERIA y AULA
            const payloadGrupos = [
                { id_asignacion: 1, materia: "Estructura de Datos", clave: "AED-1283", aula: "Aula L2", horario: "08:00 - 09:00", alumnos: 28 },
                { id_asignacion: 2, materia: "Programación Web", clave: "TCH-1024", aula: "Laboratorio C", horario: "12:00 - 13:00", alumnos: 32 }
            ];

            renderizarGrupos(payloadGrupos);
        });

        function renderizarGrupos(grupos) {
            const tbody = document.getElementById('tablaGrupos');
            tbody.innerHTML = "";

            grupos.forEach(grupo => {
                const tr = document.createElement('tr');
                tr.className = "table-row-selectable";
                tr.setAttribute('onclick', `seleccionarGrupo(${grupo.id_asignacion})`);
                
                tr.innerHTML = `
                    <td class="font-bold text-prussian">${grupo.materia}</td>
                    <td>${grupo.clave}</td>
                    <td>${grupo.aula}</td>
                    <td>${grupo.horario}</td>
                    <td><span class="badge-count">${grupo.alumnos}</span></td>
                    <td>
                        <button class="btn-table-action">
                            <span class="material-symbols-rounded">chevron_right</span>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function seleccionarGrupo(idAsignacion) {
            window.location.href = "alumnos-grupo.html?id_asignacion=" + idAsignacion;
        }
    </script>
</body>
</html>
