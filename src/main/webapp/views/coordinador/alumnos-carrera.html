<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACADEX — Alumnos de la Carrera</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded">
    
    <link rel="stylesheet" href="../../css/acadex-styles.css">
    <link rel="stylesheet" href="../../css/forms-acadex.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <img src="../../assets/AcadexLogo.png" alt="ACADEX Logo">
                </div>
                <span class="logo-text">ACADEX</span>
            </div>
            
            <nav class="sidebar-section">
                <p class="sidebar-label">Administración</p>
                <a href="materias.html" class="nav-item">
                    <span class="material-symbols-rounded nav-icon">book</span>
                    Materias
                </a>
                <a href="grupos.html" class="nav-item">
                    <span class="material-symbols-rounded nav-icon">groups</span>
                    Grupos / Horarios
                </a>
                <a href="alumnos-carrera.html" class="nav-item active">
                    <span class="material-symbols-rounded nav-icon">school</span>
                    Alumnos de la carrera
                </a>
                <a href="../Docentes/alta.html" class="nav-item">
                    <span class="material-symbols-rounded nav-icon">person_4</span>
                    Docentes
                </a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1 class="topbar-title">Gestión de Alumnos <span class="topbar-sub">/ Alumnos de la Carrera</span></h1>
                <div class="topbar-actions">
                    <div class="avatar">AJ</div>
                </div>
            </header>

            <section class="content content-centered bg-acadex">
                <div class="form-card" style="max-width: 950px;">
                    <div class="brand-header">
                        <div class="brand-logo-circle brand-logo-transparent">
                            <img src="../../assets/AcadexLogo.png" alt="ACADEX Logo" class="brand-logo-img">
                        </div>
                        <span class="brand-name-text">Acadex</span>
                    </div>

                    <header class="form-title-group">
                        <h1 class="form-title">Consulta de Alumnos</h1>
                        <p class="form-subtitle">Filtra y visualiza el padrón de estudiantes inscritos.</p>
                    </header>

                    <form id="formFiltrosAlumnos" class="form-grid">
                        
                        <div class="input-group" id="wrap-busqueda">
                            <label class="input-label" for="campo-busqueda">Nombre o número de control</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded icon-accent">search</span>
                                <input type="text" id="campo-busqueda" placeholder="Ej. 12345678 o Juan Pérez">
                            </div>
                        </div>

                        <div class="input-group" id="wrap-periodo">
                            <label class="input-label" for="campo-periodo">Periodo</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded icon-accent">calendar_month</span>
                                <select id="campo-periodo">
                                    <option value="todos" selected>Todos los periodos</option>
                                    <option value="ago-dic-2026">Ago - Dic 2026</option>
                                    <option value="ene-jun-2026">Ene - Jun 2026</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group" id="wrap-carrera">
                            <label class="input-label" for="campo-carrera">Carrera</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded icon-accent">workspace_premium</span>
                                <select id="campo-carrera">
                                    <option value="todas" selected>Todas las carreras</option>
                                    <option value="sistemas">Ingeniería en Sistemas Computacionales</option>
                                    <option value="informatica">Ingeniería Informática</option>
                                    <option value="gestion">Ingeniería en Gestión Empresarial</option>
                                    <option value="industrial">Ingeniería Industrial</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-actions form-actions-full" style="justify-content: flex-end; padding-top: 10px;">
                            <button type="button" id="btnBuscarAlumnos" class="btn-acadex-primary">
                                <span id="btnTextBuscar">Consultar alumnos</span>
                                <span class="material-symbols-rounded">manage_search</span>
                            </button>
                        </div>
                    </form>
                    <div id="resultados-alumnos" style="margin-top: 2rem;">
                        
                    </div>

                </div>
            </section>
        </main>
    </div>

</body>
</html>
